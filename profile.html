<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Postify - Profile</title>
    <link rel="stylesheet" href="profile-style.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <a class="brand-logo" href="index.html">Postify</a>
            
            <div class="nav-menu">
                <ul class="nav-links">
                    <li><a class="nav-link" href="index.html">Home</a></li>
                    <li><a class="nav-link active" href="profile.html">Profile</a></li>
                </ul>
                
                <div class="user-nav-profile">
                    <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb" class="nav-avatar" alt="user avatar">
                    <span class="nav-username">Name</span>
                    <a type="button" class="btn logout-btn" id="logoutButton">Logout</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="profile-container">
        
        <section class="info-card">
            <div class="info-card-layout">
                <div class="info-meta-section">
                    <img src="https://placehold.co/120" class="main-profile-avatar" alt="Profile Avatar">
                    <div class="user-info-text">
                        <h4 class="user-email-title">Name</h4>
                        <h6 class="username-subtitle">username</h6>
                        <p class="full-name-desc">Email</p>
                    </div>
                </div>
                
                <div class="stats-numbers-wrapper">
                    <div class="stat-box">
                        <span class="stat-count">13</span>
                        <span class="stat-text">Posts</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-count">30</span>
                        <span class="stat-text">Comments</span>
                    </div>
                </div>
            </div>
        </section>

        <h2 class="section-title">Account's Posts</h2>

        <div id="user-posts-container">
            
            <article class="post-card">
                <header class="post-header">
                    <img src="https://placehold.co/40" class="user-avatar" alt="user avatar">
                    <span class="username-text">username</span>
                </header>
                
                <div class="image-wrapper">
                    <img src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05" class="post-img" alt="post">
                </div>
                
                <div class="post-body">
                    <h6 class="post-time">2 min ago</h6>
                    <h5 class="post-title-text">Special title treatment</h5>
                    <p class="post-desc">With supporting text below as a natural lead-in to additional content.</p>
                    <hr class="custom-hr">
                    
                    <footer class="post-footer">
                        <div class="comments-count">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                                <path d="m13.498.795.149-.149a1.207 1.207 0 1 1 1.707 1.708l-.149.148a1.5 1.5 0 0 1-.059 2.059L4.854 14.854a.5.5 0 0 1-.233.131l-4 1a.5.5 0 0 1-.606-.606l1-4a.5.5 0 0 1 .131-.232l9.642-9.642a.5.5 0 0 0-.642.056L6.854 4.854a.5.5 0 1 1-.708-.708L9.44.854A1.5 1.5 0 0 1 11.5.796a1.5 1.5 0 0 1 1.998-.001zm-.644.766a.5.5 0 0 0-.707 0L1.95 11.756l-.764 3.057 3.057-.764L14.44 3.854a.5.5 0 0 0 0-.707l-1.587-1.587z"/>
                            </svg>
                            <span>(3) Comments</span>
                        </div>
                    </footer>
                </div>
            </article>

        </div>
    </main>

    <script src="node_modules/axios/dist/axios.min.js"></script>
    <script src="profile.js"></script>
</body>
</html>
