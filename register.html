<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="register.css">
</head>
<body>
    <div class="login-container">
        <h2>Create Account</h2>
        <form id="registerForm">
            <div class="input-group">
                <label for="registerEmail">Email Address</label>
                <input type="email" id="registerEmail" required placeholder="Enter your email">
            </div>

            <div class="input-group">
                <label for="registerUsername">Username</label>
                <input type="text" id="registerUsername" required placeholder="Choose a username">
            </div>

            <div class="input-group">
                <label for="registerName">Name</label>
                <input type="text" id="registerName" required placeholder="Choose a Name">
            </div>

            <div class="input-group">
                <label for="registerPassword">Password</label>
                <input type="password" id="registerPassword" required placeholder="Create a strong password">
            </div>

            <button type="submit" class="auth-btn">Register</button>
        </form>
        
        <p class="switch-auth">Already have an account? <a href="login.html">Login here</a></p>
        <div id="errorContainer"></div>
        </div>
    <script src="node_modules/axios/dist/axios.min.js"></script>
    <script src="register.js"></script>
</body>
</html>
