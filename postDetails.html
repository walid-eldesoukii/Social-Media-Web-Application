<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Details</title>
    <link rel="stylesheet" href="postDetails.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="back-btn">⬅ Back to Home</a>
            <h2 class="nav-title">Postify</h2>
        </div>
    </nav>

    <main class="main-container-details">
        
        <div id="single-post-container">
            <p class="loading-text">Loading post details...</p>
        </div>

        <section class="comments-section">
            <h3>Comments</h3>
            
            <div id="comments-container"></div>

            <div class="add-comment-box" id="add-comment-div">
                <input type="text" id="comment-input" placeholder="Write a comment...">
                <button id="submit-comment-btn">Send</button>
            </div>
        </section>
        <div id="alert-container" style="position: fixed; top: 20px; right: 20px; z-index: 1000; width: 300px;"></div>

    </main>
    <script src="node_modules/axios/dist/axios.min.js"></script>
    <script src="postDetails.js"></script>
</body>
</html>
